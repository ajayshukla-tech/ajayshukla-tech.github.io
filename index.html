<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ajay Shukla | Cloud Portfolio</title>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
html { scroll-behavior: smooth; }
body { font-family: Arial, sans-serif; margin:0; background:#0f172a; color:white; }

/* ===== SCROLL PROGRESS BAR ===== */
#progress-bar { position:fixed; top:0; left:0; height:4px; background:#38bdf8; width:0%; z-index:9999; }

/* ===== HERO SECTION ===== */
.hero-bg { position:absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(270deg, #0f172a, #1e293b, #0f172a); background-size: 600% 600%; z-index:-1; animation: gradientBG 20s ease infinite; }
@keyframes gradientBG { 0% {background-position:0% 50%;} 50% {background-position:100% 50%;} 100% {background-position:0% 50%;} }

header { background:transparent; padding:120px 20px; text-align:center; position:relative; overflow:hidden; }
header h1 { margin:0; font-size:60px; color:#38bdf8; }
header .title { margin-top:10px; color:#94a3b8; font-size:20px; }
header .dynamic-text { margin-top:15px; color:#38bdf8; font-size:18px; font-weight:bold; }
header button { margin-top:25px; background:#38bdf8; color:#0f172a; border:none; padding:14px 30px; font-size:16px; border-radius:6px; cursor:pointer; transition: transform 0.3s, background 0.3s; }
header button:hover { background:#0ea5e9; transform: translateY(-3px); }

/* ===== NAVIGATION ===== */
nav { background:#1e293b; text-align:center; padding:12px; position:sticky; top:0; z-index:100; }
nav a { color:white; margin:0 20px; text-decoration:none; font-weight:600; padding:8px 12px; border-radius:4px; transition: color 0.3s, background 0.3s, transform 0.2s; }
nav a:hover { color:#0ea5e9; background: rgba(56,189,248,0.1); transform: translateY(-3px); }
nav a.active { color:#38bdf8; border-bottom:2px solid #38bdf8; }

/* ===== SECTIONS ===== */
.section { padding:60px 20px; max-width:1000px; margin:auto; }
h2 { border-bottom:2px solid #38bdf8; padding-bottom:5px; margin-bottom:25px; }

/* ===== BORDERED BOXES ===== */
.bordered-box { border:2px solid #38bdf8; padding:25px 30px; border-radius:10px; margin-bottom:30px; background: rgba(30,41,59,0.2); transition: transform 0.3s, background 0.3s; }
.bordered-box:hover { transform: translateY(-3px); background: rgba(56,189,248,0.2); }

/* ===== SKILLS & PROJECTS GRID ===== */
.skills-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
.skill-card, .project-card { border:2px solid #38bdf8; border-radius:10px; padding:20px; background: rgba(30,41,59,0.2); transition: transform 0.3s, background 0.3s; cursor:pointer; }
.skill-card:hover, .project-card:hover { transform: translateY(-3px); background: rgba(56,189,248,0.2); }
.skill-bar { height:6px; background:#334155; border-radius:3px; margin-top:8px; }
.skill-bar div { height:100%; background:#38bdf8; border-radius:3px; }

/* ===== CONTACT ===== */
.contact-item { 
  display:flex; 
  align-items:center; 
  gap:15px; 
  margin-bottom:15px; 
  padding:8px 12px; 
  border-radius:6px; 
  transition: background 0.3s, transform 0.2s; 
  cursor:pointer;
}
.contact-item i { 
  font-size:22px; 
  color:#38bdf8; 
  transition: color 0.3s, transform 0.2s; 
}
.contact-item a { 
  color:white; 
  text-decoration:none; 
  transition: color 0.3s; 
}

/* Hover effect for contact items */
.contact-item:hover { 
  background: rgba(56,189,248,0.2); 
  transform: translateY(-2px); 
}
.contact-item:hover i { 
  transform: scale(1.2); 
  color:#0ea5e9; 
}
.contact-item:hover a { 
  color:#0ea5e9; 
}
</style>
</head>

<body>

<!-- SCROLL PROGRESS BAR -->
<div id="progress-bar"></div>

<!-- HERO SECTION -->
<header>
  <div class="hero-bg"></div>
  <h1>Ajay Shukla</h1>
  <p class="title">Software Engineer | Enterprise Application Support</p>
  <p class="dynamic-text">Learning <span id="skill">Microsoft Azure</span> & Cloud Technologies</p>
  <button onclick="window.open('resume.pdf')"><i class="fa-solid fa-download"></i> Download Resume</button>
</header>

<!-- NAVIGATION -->
<nav>
  <a href="#about">About</a>
  <a href="#experience">Experience</a>
  <a href="#skills">Skills</a>
  <a href="#learning">Learning</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<!-- CONTACT SECTION UPDATED -->
<div class="section" id="contact">
  <h2>Contact</h2>
  <div>
    <div class="contact-item">
      <i class="fa-solid fa-envelope"></i>
      <a href="mailto:abdude989@gmail.com">abdude989@gmail.com</a>
    </div>
    <div class="contact-item">
      <i class="fa-brands fa-linkedin"></i>
      <a href="https://www.linkedin.com/in/ajay-shukla-b6939b268/" target="_blank">linkedin.com/in/ajay-shukla-b6939b268</a>
    </div>
    <div class="contact-item">
      <i class="fa-brands fa-github"></i>
      <a href="https://github.com/ajayshukla-tech" target="_blank">github.com/ajayshukla-tech</a>
    </div>
  </div>
</div>

<script>
// Rotating skills in hero
const skills = ["Microsoft Azure","Cloud Infrastructure","SQL","IAM","Enterprise Tools"];
let i = 0;
setInterval(() => { document.getElementById("skill").textContent = skills[i]; i=(i+1)%skills.length; }, 2000);

// Highlight nav link on scroll
const sections = document.querySelectorAll('.section');
const navLinks = document.querySelectorAll('nav a');
window.addEventListener('scroll', () => {
    let scrollPos = window.scrollY + 150;
    sections.forEach((section) => {
        if(scrollPos >= section.offsetTop && scrollPos < section.offsetTop + section.offsetHeight){
            navLinks.forEach(a=>a.classList.remove('active'));
            const activeLink = document.querySelector(`nav a[href="#${section.id}"]`);
            if(activeLink) activeLink.classList.add('active');
        }
    });
    // Scroll progress bar
    const scrollTop = window.scrollY;
    const docHeight = document.body.scrollHeight - window.innerHeight;
    const scrollPercent = (scrollTop/docHeight)*100;
    document.getElementById('progress-bar').style.width = scrollPercent + "%";
});
</script>

</body>
</html>
