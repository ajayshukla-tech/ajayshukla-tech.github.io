<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ajay Shukla | Cloud Portfolio</title>

<meta name="description" content="Ajay Shukla - Software Engineer specializing in Enterprise Application Support and Microsoft Azure cloud technologies.">
<meta name="keywords" content="Ajay Shukla, Azure, Cloud, IAM, Software Engineer, Portfolio">
<meta name="author" content="Ajay Shukla">

<link rel="icon" href="favicon.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

html{scroll-behavior:smooth;}

body{
font-family:Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
}

/* PROGRESS BAR */

#progressBar{
position:fixed;
top:0;
left:0;
height:4px;
background:#38bdf8;
width:0%;
z-index:200;
}

/* HERO BACKGROUND */

.hero-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(270deg,#0f172a,#1e293b,#0f172a);
background-size:600% 600%;
animation:gradientBG 20s ease infinite;
z-index:-1;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */

header{
background:transparent;
padding:120px 20px;
text-align:center;
position:relative;
overflow:hidden;
}

.profile-photo{
width:120px;
height:120px;
border-radius:50%;
border:3px solid #38bdf8;
margin-bottom:20px;
}

header h1{
margin:0;
font-size:60px;
color:#38bdf8;
}

header .title{
margin-top:10px;
color:#94a3b8;
font-size:20px;
}

header .dynamic-text{
margin-top:15px;
color:#38bdf8;
font-size:18px;
font-weight:bold;
}

/* DOWNLOAD BUTTON */

header .download-btn{
position:absolute;
top:20px;
right:20px;
background:#38bdf8;
color:#0f172a;
border:none;
padding:12px 22px;
font-size:14px;
border-radius:6px;
cursor:pointer;
display:flex;
align-items:center;
gap:6px;
transition:transform 0.3s, background 0.3s;
}

header .download-btn:hover{
background:#0ea5e9;
transform:translateY(-3px);
}

/* NAVIGATION */

nav{
background:#1e293b;
padding:12px;
position:sticky;
top:0;
z-index:100;

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

nav a{
color:white;
text-decoration:none;
font-weight:600;
padding:8px 12px;
border-radius:4px;
transition:color 0.3s, background 0.3s, transform 0.2s;
}

nav a:hover{
color:#0ea5e9;
background:rgba(56,189,248,0.1);
transform:translateY(-3px);
}

nav a.active{
color:#38bdf8;
border-bottom:2px solid #38bdf8;
}

/* SECTION */

.section{
padding:60px 20px;
max-width:1000px;
margin:auto;
opacity:0;
transform:translateY(20px);
transition:0.6s;
}

.section.show{
opacity:1;
transform:translateY(0);
}

h2{
border-bottom:2px solid #38bdf8;
padding-bottom:5px;
margin-bottom:25px;
}

/* BOX */

.bordered-box{
border:2px solid #38bdf8;
padding:25px 30px;
border-radius:10px;
margin-bottom:30px;
background:rgba(30,41,59,0.2);
transition:transform 0.3s, background 0.3s;
}

.bordered-box:hover{
transform:translateY(-3px);
background:rgba(56,189,248,0.2);
}

/* GRID */

.skills-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* SKILL CARD */

.skill-card{
border:2px solid #38bdf8;
border-radius:10px;
padding:20px;
background:rgba(30,41,59,0.2);
display:flex;
align-items:center;
gap:12px;
font-weight:bold;
transition:transform 0.3s, background 0.3s;
}

.skill-card:hover{
background:rgba(56,189,248,0.2);
transform:translateY(-3px);
}

/* PROJECT CARD */

.project-card{
border:2px solid #38bdf8;
border-radius:10px;
padding:20px;
background:rgba(30,41,59,0.2);
display:flex;
flex-direction:column;
align-items:flex-start;
transition:transform 0.3s, background 0.3s;
}

.project-card:hover{
background:rgba(56,189,248,0.2);
transform:translateY(-3px);
}

.project-card b{
font-size:16px;
margin-bottom:8px;
}

.project-card span{
font-size:14px;
color:#e2e8f0;
}

.project-link{
margin-top:10px;
color:#38bdf8;
text-decoration:none;
font-size:14px;
}

.project-link:hover{
text-decoration:underline;
}

/* CONTACT */

.contact-item-wrapper{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.contact-item{
display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
padding:12px;
border-radius:8px;
background:rgba(30,41,59,0.2);
cursor:pointer;
transition:transform 0.3s, background 0.3s;
}

.contact-item:hover{
background:rgba(56,189,248,0.2);
transform:translateY(-3px);
}

.contact-item i{
font-size:22px;
color:#38bdf8;
transition:transform 0.3s, color 0.3s;
}

.contact-item:hover i{
transform:scale(1.2);
color:#0ea5e9;
}

.contact-item a{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:white;
width:100%;
}

/* COPY ICON */

.copy-icon{
opacity:0;
font-size:18px;
color:#94a3b8;
cursor:pointer;
transition:opacity 0.3s,color 0.3s;
}

.contact-item:hover .copy-icon{
opacity:1;
}

.copy-icon.copied{
color:#22c55e;
opacity:1;
}

/* BACK TO TOP */

#topBtn{
position:fixed;
bottom:25px;
right:25px;
background:#38bdf8;
border:none;
padding:12px 15px;
border-radius:6px;
cursor:pointer;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#020617;
color:#94a3b8;
font-size:14px;
}

</style>

</head>

<body>

<div id="progressBar"></div>

<header>

<div class="hero-bg"></div>

<img src="profile.jpg" class="profile-photo">

<h1>Ajay Shukla</h1>

<p class="title">Software Engineer | Enterprise Application Support</p>

<p class="dynamic-text">
Learning <span id="skill">Microsoft Azure</span> & Cloud Technologies
</p>

<button id="download-btn" class="download-btn">
<i class="fa-solid fa-download"></i> Download Resume
</button>

</header>

<nav>
<a href="#about">About</a>
<a href="#experience">Experience</a>
<a href="#skills">Skills</a>
<a href="#certifications">Certifications</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

<div id="resume-content">

<!-- ALL YOUR SECTIONS ABOVE CONTACT REMAIN SAME -->

<div class="section" id="contact">
<h2>Contact</h2>

<div class="contact-item-wrapper">

<div class="contact-item">
<a href="mailto:abdude989@gmail.com">
<i class="fa-solid fa-envelope"></i>
<span id="emailText">abdude989@gmail.com</span>
</a>
<i class="fa-regular fa-clone copy-icon" onclick="copyText('emailText',this)"></i>
</div>

<div class="contact-item">
<a href="https://www.linkedin.com/in/ajay-shukla-b6939b268/" target="_blank">
<i class="fa-brands fa-linkedin"></i>
<span id="linkedinText">linkedin.com/in/ajay-shukla-b6939b268</span>
</a>
<i class="fa-regular fa-clone copy-icon" onclick="copyText('linkedinText',this)"></i>
</div>

<div class="contact-item">
<a href="https://github.com/ajayshukla-tech" target="_blank">
<i class="fa-brands fa-github"></i>
<span id="githubText">github.com/ajayshukla-tech</span>
</a>
<i class="fa-regular fa-clone copy-icon" onclick="copyText('githubText',this)"></i>
</div>

</div>
</div>

</div>

<button id="topBtn">↑</button>

<footer>
© 2026 Ajay Shukla | Cloud Portfolio
</footer>

<script>

/* COPY FUNCTION */

function copyText(id,icon){
const text=document.getElementById(id).innerText;
navigator.clipboard.writeText(text);

icon.classList.remove("fa-clone");
icon.classList.add("fa-check","copied");

setTimeout(()=>{
icon.classList.remove("fa-check","copied");
icon.classList.add("fa-clone");
},2000);
}

</script>

</body>
</html>
