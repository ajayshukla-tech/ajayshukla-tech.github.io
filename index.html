<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ajay Shukla | Cloud Portfolio</title>
<meta name="description" content="Ajay Shukla - Software Engineer specializing in Enterprise Application Support and Microsoft Azure cloud technologies.">
<meta name="keywords" content="Ajay Shukla, Azure, Cloud, IAM, Software Engineer, Portfolio">
<meta name="author" content="Ajay Shukla">

<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
html{scroll-behavior:smooth;}
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#0f172a;
  color:white;
}

/* PROGRESS BAR */
#progressBar{
  position:fixed;
  top:0;
  left:0;
  height:4px;
  background:#38bdf8;
  width:0%;
  z-index:200;
}

/* HERO BACKGROUND */
.hero-bg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(270deg,#0f172a,#1e293b,#0f172a);
  background-size:600% 600%;
  animation:gradientBG 20s ease infinite;
  z-index:-1;
}
@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* HEADER */
header{
  background:transparent;
  padding:120px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.profile-photo{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #38bdf8;
  margin-bottom:20px;
}
header h1{
  margin:0;
  font-size:60px;
  color:#38bdf8;
}
header .title{
  margin-top:10px;
  color:#94a3b8;
  font-size:20px;
}
header .dynamic-text{
  margin-top:15px;
  color:#38bdf8;
  font-size:18px;
  font-weight:bold;
}

/* DOWNLOAD BUTTON */
header .download-btn{
  position:absolute;
  top:20px;
  right:20px;
  background:#38bdf8;
  color:#0f172a;
  border:none;
  padding:12px 22px;
  font-size:14px;
  border-radius:6px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:transform 0.3s, background 0.3s;
}
header .download-btn:hover{
  background:#0ea5e9;
  transform:translateY(-3px);
}

/* NAVIGATION */
nav{
  background:#1e293b;
  padding:12px;
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}
nav a{
  color:white;
  text-decoration:none;
  font-weight:600;
  padding:8px 12px;
  border-radius:4px;
  transition:color 0.3s, background 0.3s, transform 0.2s;
}
nav a:hover{
  color:#0ea5e9;
  background:rgba(56,189,248,0.1);
  transform:translateY(-3px);
}
nav a.active{
  color:#38bdf8;
  border-bottom:2px solid #38bdf8;
}

/* SECTION */
.section{
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
  opacity:0;
  transform:translateY(20px);
  transition:0.6s;
}
.section.show{
  opacity:1;
  transform:translateY(0);
}
h2{
  border-bottom:2px solid #38bdf8;
  padding-bottom:5px;
  margin-bottom:25px;
}

/* BOX */
.bordered-box{
  border:2px solid #38bdf8;
  padding:25px 30px;
  border-radius:10px;
  margin-bottom:30px;
  background:rgba(30,41,59,0.2);
  transition:transform 0.3s, background 0.3s;
}
.bordered-box:hover{
  transform:translateY(-3px);
  background:rgba(56,189,248,0.2);
}

/* GRID */
.skills-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* SKILL CARD */
.skill-card{
  border:2px solid #38bdf8;
  border-radius:10px;
  padding:20px;
  background:rgba(30,41,59,0.2);
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:bold;
  transition:transform 0.3s, background 0.3s;
  position:relative;
}
.skill-card:hover{
  background:rgba(56,189,248,0.2);
  transform:translateY(-3px);
}
/* Upgrade: radial progress inside skill cards */
.skill-card .radial-progress{
  width:50px;
  height:50px;
  border-radius:50%;
  background:conic-gradient(#38bdf8 0% var(--progress,80%), rgba(56,189,248,0.2) var(--progress,80%) 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:14px;
  font-weight:bold;
}

/* PROJECT CARD */
.project-card{
  border:2px solid #38bdf8;
  border-radius:10px;
  padding:20px;
  background:rgba(30,41,59,0.2);
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  transition:transform 0.3s, background 0.3s;
  position:relative;
  overflow:hidden;
}
.project-card:hover{
  background:rgba(56,189,248,0.2);
  transform:translateY(-3px);
}
/* Upgrade: hover overlay */
.project-card .project-overlay{
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
  color:#38bdf8;
  text-align:center;
  opacity:0;
  transition:opacity 0.4s;
}
.project-card:hover .project-overlay{
  opacity:1;
}

/* CONTACT */
.contact-item-wrapper{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:20px;
}
.contact-item{
  display:flex;
  align-items:center;
  gap:15px;
  padding:12px;
  border-radius:8px;
  background:rgba(30,41,59,0.2);
  cursor:pointer;
  transition:transform 0.3s, background 0.3s;
  position:relative;
  justify-content:space-between;
}
.contact-item:hover{
  background:rgba(56,189,248,0.2);
  transform:translateY(-3px);
}
.contact-item i{
  font-size:22px;
  color:#38bdf8;
  transition:transform 0.3s, color 0.3s;
}
.contact-item:hover i{
  transform:scale(1.2);
  color:#0ea5e9;
}
.contact-item a{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:white;
  width:100%;
  transition:transform 0.3s;
}
/* Upgrade: smooth checkmark animation with tooltip */
.copy-icon{
  font-size:18px;
  color:#38bdf8;
  cursor:pointer;
  transition:all 0.3s ease;
  position:relative;
}
.copy-icon .tooltip{
  position:absolute;
  top:-25px;
  left:50%;
  transform:translateX(-50%);
  background:#38bdf8;
  color:#0f172a;
  padding:2px 6px;
  border-radius:4px;
  font-size:12px;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
}
.copy-icon.show-tooltip .tooltip{
  opacity:1;
  transform:translateX(-50%) translateY(-5px);
}

/* BACK TO TOP */
#topBtn{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#38bdf8;
  border:none;
  padding:12px 15px;
  border-radius:6px;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#020617;
  color:#94a3b8;
  font-size:14px;
}
</style>

<body>

<div id="progressBar"></div>

<header>
<div class="hero-bg"></div>
<img src="profile.jpg" class="profile-photo">
<h1>Ajay Shukla</h1>
<p class="title">Software Engineer | Enterprise Application Support</p>
<p class="dynamic-text">
Learning <span id="skill">Microsoft Azure</span> & Cloud Technologies
</p>
<button id="download-btn" class="download-btn">
<i class="fa-solid fa-download"></i> Download Resume
</button>
</header>

<nav>
<a href="#about">About</a>
<a href="#experience">Experience</a>
<a href="#skills">Skills</a>
<a href="#certifications">Certifications</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

<div id="resume-content">

<!-- All your original sections remain unchanged -->

</div>

<button id="topBtn">↑</button>
<footer>© 2026 Ajay Shukla | Cloud Portfolio</footer>

<script>
/* Prevent automatic jump to hash and scroll to top */
if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
window.scrollTo(0,0);

/* rotating hero skill */
const skills=["Microsoft Azure","Cloud Infrastructure","SQL","IAM","Enterprise Tools"];
let i=0;
setInterval(()=>{
  document.getElementById("skill").textContent=skills[i];
  i=(i+1)%skills.length;
},2000);

/* section animation */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".section").forEach(section=>{
  observer.observe(section);
});

/* scroll progress bar */
window.onscroll=function(){
  let winScroll=document.body.scrollTop || document.documentElement.scrollTop;
  let height=document.documentElement.scrollHeight-document.documentElement.clientHeight;
  let scrolled=(winScroll/height)*100;
  document.getElementById("progressBar").style.width=scrolled+"%";
};

/* nav active section */
const sections=document.querySelectorAll('.section');
const navLinks=document.querySelectorAll('nav a');
window.addEventListener('scroll',()=>{
  let scrollPos=window.scrollY+150;
  sections.forEach((section)=>{
    if(scrollPos>=section.offsetTop && scrollPos<section.offsetTop+section.offsetHeight){
      navLinks.forEach(a=>a.classList.remove('active'));
      const activeLink=document.querySelector(`nav a[href="#${section.id}"]`);
      if(activeLink) activeLink.classList.add('active');
    }
  });
});

/* top button */
document.getElementById("topBtn").onclick=function(){
  window.scrollTo({top:0,behavior:'smooth'});
};

/* resume download */
document.getElementById('download-btn').addEventListener('click', function() {
  const element=document.getElementById('resume-content').cloneNode(true);
  html2pdf().from(element).set({
    margin:0.5,
    filename:'AjayShukla_Resume.pdf',
    html2canvas:{scale:2},
    jsPDF:{unit:'in',format:'letter',orientation:'portrait'}
  }).save();
});

/* copy to clipboard functionality with smooth check + tooltip */
document.querySelectorAll('.copy-icon').forEach(icon => {
  icon.addEventListener('click', (e) => {
    e.stopPropagation();
    const textToCopy = icon.getAttribute('data-copy');
    navigator.clipboard.writeText(textToCopy).then(() => {
      icon.classList.add('fa-check', 'show-tooltip');
      setTimeout(()=>{
        icon.classList.remove('fa-check','show-tooltip');
      },1000);
    });
  });
});
</script>

</body>
</html>
